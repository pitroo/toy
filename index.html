<!doctype html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Untuk cimut ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:'Poppins', sans-serif;
  color:white;
}

.start{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  z-index:10;
}

.start h2{
  font-family:'Playfair Display', serif;
  font-size:28px;
}

/* GAME */
#game{
  display:none;
  width:100%;
  height:100%;
  position:fixed;
  background:url('https://raw.githubusercontent.com/pitroo/toy/main/13.jpeg') no-repeat center;
  background-size:cover;
}

#game::after{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.heart{
  position:absolute;
  font-size:28px;
  animation:float 4s linear;
  z-index:2;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

.screen{display:none;position:fixed;width:100%;height:100%;}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:2s;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);
}

.text{
  position:absolute;
  bottom:100px;
  left:20px;
  right:20px;
  font-size:20px;
}

.chat{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  display:none;
}

.bubble{
  background:#25D366;
  color:black;
  padding:10px;
  border-radius:15px;
  margin:5px;
  max-width:70%;
}

.final{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-size:28px;
  opacity:0;
  transition:2s;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}
</style>
</head>

<body>

<div class="start" id="startScreen">
  <h2>💖 Aku punya sesuatu buat kamu tauuu...</h2>
  <button onclick="startGame()">Mulai</button>
  <br><br>
  <button onclick="openCode()">🔑</button>
</div>

<div id="codeBox" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;color:black;padding:20px;border-radius:10px;">
  <h3>Masukkan Kode</h3>
  <input id="codeInput" type="password">
  <br><br>
  <button onclick="checkCode()">Submit</button>
</div>

<div id="game"></div>

<div class="screen">
  <img id="slide" class="slide">
  <div class="overlay"></div>
  <div class="text" id="text"></div>
  <div class="chat" id="chat"></div>
  <div class="final" id="final"></div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://raw.githubusercontent.com/pitroo/toy/main/Bruno%20Mars%20-%20Risk%20It%20All%20Official%20Music%20Video.mp3">
</audio>

<audio id="voice">
<source src="VOICE_NOTE_KAMU.mp3">
</audio>

<script>
const ANNIV_DATE = "05-15";
const SECRET_CODE = "hayo";
let unlocked = false;
let musicDuration = 0;
let slideDelay = 4000;

function isAnniversary(){
  const t = new Date();
  return `${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}` === ANNIV_DATE;
}

function openCode(){
  document.getElementById("codeBox").style.display="block";
}

function checkCode(){
  if(document.getElementById("codeInput").value === SECRET_CODE){
    unlocked = true;
    alert("Berhasil dibuka 💖");
    document.getElementById("codeBox").style.display="none";
  } else alert("Kode salah 😢");
}

let score=0;

function startGame(){
  if(!isAnniversary() && !unlocked){
    alert("💌 Tunggu hari spesial ya 🥺");
    return;
  }

  document.getElementById("startScreen").style.display="none";
  document.getElementById("game").style.display="block";

  const int=setInterval(()=>{
    spawn();
    if(score>=6){
      clearInterval(int);
      setTimeout(startStory,1500);
    }
  },800);
}

function spawn(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=Math.random()*90+"vw";
  h.onclick=()=>{score++;h.remove();};
  document.getElementById("game").appendChild(h);
  setTimeout(()=>h.remove(),4000);
}

const story=[
  {img:"https://raw.githubusercontent.com/pitroo/toy/main/sma.jpg", text:"Cimutt inget ga... pertama kita kenal?"},
  {img:"https://raw.githubusercontent.com/pitroo/toy/main/rumah damar.jpg", text:"Dari SMA sampai sekarang kita masih disini..."},
  {img:"https://raw.githubusercontent.com/pitroo/toy/main/pertama.jpg", text:"Kita banyak banget berantemnya..."},
  {img:"https://raw.githubusercontent.com/pitroo/toy/main/ultah cimut 1.jpg", text:"jangan pernah bosen sama emoy ya..."},
  {img:"https://raw.githubusercontent.com/pitroo/toy/main/6.jpeg", text:"Emoyy selalu disini buat kamu..."}
];

const music=document.getElementById("music");

music.addEventListener("loadedmetadata",()=>{
  musicDuration=music.duration;
  slideDelay=(musicDuration*1000-8000)/story.length;
});

let i=0;

function startStory(){
  document.getElementById("game").style.display="none";
  document.querySelector(".screen").style.display="block";
  playMusic();
  next();
}

function next(){
  const slide=document.getElementById("slide");
  const text=document.getElementById("text");

  slide.style.opacity=0;
  text.innerHTML="";

  setTimeout(()=>{
    slide.src=story[i].img;
    slide.style.opacity=1;
    typeText(story[i].text,text);

    i++;
    if(i<story.length){
      setTimeout(next,slideDelay);
    } else {
      setTimeout(showChat,2000);
    }
  },800);
}

function typeText(str,el){
  let j=0;
  (function t(){
    if(j<str.length){
      el.innerHTML+=str[j++];
      setTimeout(t,40);
    }
  })();
}

const chats=["cimutt lagi apaaa?","Emoyy kangen 🥺","jangan bosen yaa...","Emoyy butuh Cimutt"];

function showChat(){
  const box=document.getElementById("chat");
  box.style.display="block";
  let k=0;
  (function loop(){
    if(k<chats.length){
      let b=document.createElement("div");
      b.className="bubble";
      b.innerText=chats[k++];
      box.appendChild(b);
      setTimeout(loop,1500);
    } else setTimeout(showFinal,3000);
  })();
}

function showFinal(){
  const f=document.getElementById("final");
  f.innerHTML="Emoyy ga sempurna...<br><br>Tapi selalu berusaha...<br><br><b>Emoyy sayang Cimutt ❤️</b>";
  f.style.opacity=1;

  let m=document.getElementById("music");
  let fade=setInterval(()=>{
    if(m.volume>0.05){m.volume-=0.03;}
    else{m.pause();clearInterval(fade);}
  },200);
}

function playMusic(){
  const m=document.getElementById("music");
  m.volume=0;
  m.play();
  let v=0;
  let fade=setInterval(()=>{
    if(v<1){v+=0.03;m.volume=v;}
    else clearInterval(fade);
  },200);
}
</script>

</body>
</html>
