<!doctype html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Secret Love Page 💖</title>

<style>
body {
  margin:0;
  height:100vh;
  font-family: Arial;
  overflow:hidden;
}

/* Background */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://pitroo.github.io/toy/13.jpeg") center/cover;
  z-index:-1;
}

/* Overlay */
.overlay {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

/* Popup */
.popup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:320px;
}

/* Text */
#typingText {
  color:black;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay" id="overlay"></div>

<!-- BUTTON SECRET -->
<div onclick="showPopup('secretPopup')" 
style="position:fixed;bottom:20px;right:20px;
background:#ffcc00;padding:12px;border-radius:50px;cursor:pointer;">
💖
</div>

<!-- SECRET POPUP -->
<div class="popup" id="secretPopup">
  <h2>💌 Untuk Kamu...</h2>
  <p id="typingText"></p>
  <button onclick="closePopup()">Tutup</button>
</div>

<!-- INPUT KODE -->
<div class="popup" id="codePopup">
  <h2>🔑 Masukkan Kode</h2>
  <input id="secretInput" type="password">
  <br><br>
  <button onclick="checkCode()">Submit</button>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://files.catbox.moe/9l0q7n.mp3">
</audio>

<script>

/* =========================
   SETTING
========================= */
const ANNIV_DATE = "04-15"; // GANTI tanggal jadian
const SECRET_CODE = "150424"; // GANTI kode
const nomorWA = "6281335798405"; // GANTI nomor pasangan

let unlocked = false;

/* =========================
   CEK TANGGAL
========================= */
function isAnniversary(){
  const t = new Date();
  const m = String(t.getMonth()+1).padStart(2,'0');
  const d = String(t.getDate()).padStart(2,'0');
  return `${m}-${d}` === ANNIV_DATE;
}

/* =========================
   POPUP CONTROL
========================= */
function showPopup(id){

  if(!isAnniversary() && !unlocked && id !== "codePopup"){
    alert("🔒 Tunggu hari spesial kita yaa 💖");
    return;
  }

  document.getElementById("overlay").style.display="block";
  document.getElementById(id).style.display="block";

  if(id==="secretPopup"){
    startEmotional();
  }
}

function closePopup(){
  document.getElementById("overlay").style.display="none";
  document.querySelectorAll(".popup").forEach(p=>p.style.display="none");
  document.getElementById("music").pause();
}

/* =========================
   KODE RAHASIA
========================= */
function checkCode(){
  const input = document.getElementById("secretInput").value;

  if(input === SECRET_CODE){
    unlocked = true;
    alert("Berhasil dibuka 💖");
    closePopup();
  } else {
    alert("Salah 😢");
  }
}

/* =========================
   EMOTIONAL TEXT
========================= */
const messages = [
"Aku cuma mau bilang sesuatu...",
"Makasih ya udah bertahan...",
"Aku tau aku banyak kurang...",
"Tapi kamu tetap disini...",
"Itu berarti banget buat aku...",
"",
"Aku ga janji hidup selalu mudah...",
"Tapi aku janji...",
"Aku ga akan ninggalin kamu...",
"",
"Dari semua orang di dunia...",
"Aku tetap milih kamu...",
"Setiap hari...",
"",
"Aku sayang kamu ❤️"
];

function startEmotional(){
  playMusic();
  typeText(messages);
}

function typeText(lines){
  const el = document.getElementById("typingText");
  el.innerHTML="";
  let i=0,j=0;

  function typing(){
    if(i<lines.length){
      if(j<lines[i].length){
        el.innerHTML+=lines[i][j];
        j++;
        setTimeout(typing,40);
      } else {
        el.innerHTML+="<br><br>";
        i++; j=0;
        setTimeout(typing,600);
      }
    } else {
      showFinal();
    }
  }

  typing();
}

/* =========================
   FINAL + WA
========================= */
function showFinal(){
  const el = document.getElementById("typingText");

  const final = document.createElement("div");
  final.innerHTML="I LOVE YOU 💖";
  final.style.marginTop="20px";
  final.style.fontSize="22px";

  el.appendChild(final);

  const btn = document.createElement("button");
  btn.innerText="Kirim ke Kamu 💌";
  btn.onclick=sendWA;

  el.appendChild(btn);
}

function sendWA(){
  const text = "Aku sayang kamu ❤️";
  const url = `https://wa.me/${nomorWA}?text=${encodeURIComponent(text)}`;
  window.open(url,"_blank");
}

/* =========================
   MUSIC
========================= */
function playMusic(){
  const m = document.getElementById("music");
  m.volume=0;
  m.play();

  let v=0;
  const fade=setInterval(()=>{
    if(v<1){
      v+=0.05;
      m.volume=v;
    } else clearInterval(fade);
  },200);
}

/* =========================
   AUTO OPEN DI HARI H
========================= */
window.onload = function(){
  if(isAnniversary()){
    setTimeout(()=>{
      showPopup("secretPopup");
    },1000);
  } else {
    alert("💌 Ini hadiah buat kamu... tapi belum waktunya hehe🥺");
  }
};

</script>

</body>
</html>
