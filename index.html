<!doctype html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Untuk cimut ❤️</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:'Poppins', sans-serif;
  color:white;
}

.start{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  z-index:10;
}

.start h2{
  font-family:'Playfair Display', serif;
  font-size:28px;
  letter-spacing:1px;
}

/* ===== MINIGAME WALLPAPER ===== */
#game{
  display:none;
  width:100%;
  height:100%;
  position:fixed;

  background:url('https://picsum.photos/800/1600?blur=3') no-repeat center center;
  background-size:cover;
}

/* overlay gelap biar estetik */
#game::after{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  top:0;
  left:0;
  z-index:0;
}

/* HEART DI ATAS */
.heart{
  position:absolute;
  font-size:28px;
  animation:float 4s linear;
  z-index:2;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

.screen{display:none;position:fixed;width:100%;height:100%;}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:2s;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);
}

.text{
  position:absolute;
  bottom:100px;
  left:20px;
  right:20px;
  font-size:20px;
  line-height:1.6;
  font-weight:300;
}

.chat{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  display:none;
}

.bubble{
  background:#25D366;
  color:black;
  padding:10px 14px;
  border-radius:15px;
  margin:5px 0;
  width:max-content;
  max-width:70%;
  font-family:'Quicksand', sans-serif;
  font-size:14px;
}

.final{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-size:28px;
  opacity:0;
  transition:2s;
  font-family:'Playfair Display', serif;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  font-family:'Poppins', sans-serif;
  font-weight:500;
}
</style>
</head>

<body>

<div class="start" id="startScreen">
  <h2>💖 Aku punya sesuatu buat kamu tauuu...</h2>
  <button onclick="startGame()">Mulai</button>
  <br><br>
  <button onclick="openCode()">🔑</button>
</div>

<div id="codeBox" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;color:black;padding:20px;border-radius:10px;z-index:20;">
  <h3>Masukkan Kode</h3>
  <input id="codeInput" type="password">
  <br><br>
  <button onclick="checkCode()">Submit</button>
</div>

<div id="game"></div>

<div class="screen">
  <img id="slide" class="slide">
  <div class="overlay"></div>
  <div class="text" id="text"></div>
  <div class="chat" id="chat"></div>
  <div class="final" id="final"></div>
</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/9l0q7n.mp3">
</audio>

<audio id="voice">
<source src="VOICE_NOTE_KAMU.mp3">
</audio>

<script>
const ANNIV_DATE = "04-15";
const SECRET_CODE = "150424";
let unlocked = false;

function isAnniversary(){
  const t = new Date();
  const m = String(t.getMonth()+1).padStart(2,'0');
  const d = String(t.getDate()).padStart(2,'0');
  return `${m}-${d}` === ANNIV_DATE;
}

function openCode(){
  document.getElementById("codeBox").style.display="block";
}

function checkCode(){
  const val = document.getElementById("codeInput").value;
  if(val === SECRET_CODE){
    unlocked = true;
    alert("Berhasil dibuka 💖");
    document.getElementById("codeBox").style.display="none";
  } else {
    alert("Kode salah WLEE 😢");
  }
}

let score=0;

function startGame(){
  if(!isAnniversary() && !unlocked){
    alert("💌 Tunggu ya... ini cuma bisa dibuka di hari spesial kita HEHE 🥺");
    return;
  }

  document.getElementById("startScreen").style.display="none";
  document.getElementById("game").style.display="block";

  const int=setInterval(()=>{
    spawn();
    if(score>=6){
      clearInterval(int);
      setTimeout(startStory,1500);
    }
  },800);
}

function spawn(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=Math.random()*90+"vw";

  h.onclick=()=>{score++;h.remove();};

  document.getElementById("game").appendChild(h);
  setTimeout(()=>h.remove(),4000);
}

const story=[
  {img:"https://picsum.photos/id/1011/500/900", text:"Cimutt inget ga... pertama kita kenal?"},
  {img:"https://github.com/pitroo/toy/blob/main/1.jpeg", text:"Dari SMA... sampai sekarang kita masih disini..."},
  {img:"https://github.com/pitroo/toy/blob/main/8.jpeg", text:"Kita banyak banget berantem..."},
  {img:"https://picsum.photos/id/1020/500/900", text:"Cimutt sering overthinking... "},
  {img:"https://github.com/pitroo/toy/blob/main/10.jpeg", text:"Jangan sering sering lagii yaa... ada emoyy disinii..."}
];

let i=0;

function startStory(){
  document.getElementById("game").style.display="none";
  document.querySelector(".screen").style.display="block";
  playMusic();
  next();
}

function next(){
  const slide=document.getElementById("slide");
  const text=document.getElementById("text");

  slide.style.opacity=0;
  text.innerHTML="";

  setTimeout(()=>{
    slide.src=story[i].img;
    slide.style.opacity=1;
    typeText(story[i].text,text);

    i++;
    if(i<story.length){
      setTimeout(next,4500);
    } else {
      setTimeout(showChat,4000);
    }
  },800);
}

function typeText(str,el){
  let j=0;
  function t(){
    if(j<str.length){
      el.innerHTML+=str[j];
      j++;
      setTimeout(t,40);
    }
  }
  t();
}

const chats=[
  "cimutt lagi apaaa?",
  "Emoyy kangen 🥺",
  "jangan pergi ya...",
  "Emoyy butuh Cimutt"
];

function showChat(){
  const chatBox=document.getElementById("chat");
  chatBox.style.display="block";

  let k=0;

  function nextChat(){
    if(k<chats.length){
      const b=document.createElement("div");
      b.className="bubble";
      b.innerText=chats[k];
      chatBox.appendChild(b);
      k++;
      setTimeout(nextChat,1800);
    } else {
      setTimeout(playVoice,2500);
    }
  }

  nextChat();
}

let voiceDuration = 0;
const voice = document.getElementById("voice");

voice.addEventListener("loadedmetadata", () => {
  voiceDuration = voice.duration;
});

function playVoice(){
  const v = document.getElementById("voice");
  const m = document.getElementById("music");

  let fadeDown = setInterval(()=>{
    if(m.volume > 0.2){
      m.volume -= 0.05;
    } else clearInterval(fadeDown);
  },200);

  v.play();

  setTimeout(()=>{
    showFinal();
  }, (voiceDuration * 1000) + 500);

  v.onended = () => {
    showFinal();
  };
}

function showFinal(){
  const f=document.getElementById("final");
  f.innerHTML=
  "Emoyy ga sempurna...<br><br>" +
  "Tapi Emoyy berusaha jadi yang terbaik...<br><br>" +
  "<b>Emoyy sayang Cimutt ❤️</b>";

  f.style.opacity=1;
}

function playMusic(){
  const m=document.getElementById("music");
  m.volume=0;
  m.play();

  let v=0;
  const fade=setInterval(()=>{
    if(v<1){
      v+=0.03;
      m.volume=v;
    } else clearInterval(fade);
  },200);
}
</script>

</body>
</html>
