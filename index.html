<!doctype html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Toy Story Secret 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.bg-layer {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://pitroo.github.io/toy/13.jpeg") center/cover;
  z-index: -1;
  transform: scale(1.05);
}

.overlay {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 999;
}

.cloud {
  position: absolute;
  background: white;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}

/* popup */
.popup {
  display: none;
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%);
  background: white;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  z-index: 1000;
  width:90%;
  max-width:320px;
}

.moving-cloud {
  position:absolute;
  animation: moveCloud linear infinite;
}

@keyframes moveCloud {
  from {transform: translateX(-10%)}
  to {transform: translateX(110vw)}
}

/* typing */
#typingText {
  line-height:1.6;
}
</style>
</head>

<body>

<div class="bg-layer"></div>
<div class="overlay" id="overlay"></div>

<!-- awan -->
<div class="moving-cloud" style="top:10%;animation-duration:30s">☁️</div>
<div class="moving-cloud" style="top:40%;animation-duration:50s">☁️</div>

<!-- tombol secret -->
<div class="cloud" style="top:80%;left:50%" onclick="showPopup('secretPopup')">
💖
</div>

<!-- popup karakter (tetap ada tapi dikunci) -->
<div class="popup" id="woody"><h2>Woody 🤠</h2><button onclick="closePopup()">Tutup</button></div>
<div class="popup" id="buzz"><h2>Buzz 🚀</h2><button onclick="closePopup()">Tutup</button></div>

<!-- secret -->
<div class="popup" id="secretPopup">
<h2>💌 Untuk Kamu...</h2>
<p id="typingText"></p>
<button onclick="closePopup()">Tutup</button>
</div>

<!-- kode -->
<div class="popup" id="codePopup">
<h2>🔑 Masukkan Kode</h2>
<input id="secretInput" type="password">
<br><br>
<button onclick="checkCode()">Submit</button>
</div>

<!-- tombol kode -->
<div onclick="showPopup('codePopup')" 
style="position:fixed;bottom:20px;right:20px;background:#ffcc00;padding:10px;border-radius:50px;cursor:pointer;">
🔑
</div>

<!-- audio -->
<audio id="music" loop>
<source src="https://files.catbox.moe/9l0q7n.mp3">
</audio>

<script>

/* =========================
   SETTING
========================= */
const ANNIV_DATE = "04-15"; // ganti tanggal
const SECRET_CODE = "150424";
let unlocked = false;

/* =========================
   CEK TANGGAL
========================= */
function isAnniversary(){
  const t = new Date();
  const m = String(t.getMonth()+1).padStart(2,'0');
  const d = String(t.getDate()).padStart(2,'0');
  return `${m}-${d}` === ANNIV_DATE;
}

/* =========================
   POPUP CONTROL
========================= */
function showPopup(id){

  if(!isAnniversary() && !unlocked && id !== "codePopup"){
    alert("💌 Ini hadiah buat kamu... tapi belum waktunya yaaa🥺");
    return;
  }

  document.getElementById("overlay").style.display="block";
  document.getElementById(id).style.display="block";

  if(id==="secretPopup"){
    startEmotional();
  }
}

function closePopup(){
  document.getElementById("overlay").style.display="none";
  document.querySelectorAll(".popup").forEach(p=>p.style.display="none");
  document.getElementById("music").pause();
}

/* =========================
   KODE
========================= */
function checkCode(){
  const input = document.getElementById("secretInput").value;

  if(input === SECRET_CODE){
    unlocked = true;
    alert("Berhasil dibuka 💖");
    closePopup();
  } else {
    alert("Kode salah wlee😢");
  }
}

/* =========================
   EMOTIONAL TEXT
========================= */
const messages = [
"Hei kamu...",
"Makasih ya udah bertahan sama aku 🥺",
"",
"Aku tau aku banyak kurang...",
"Tapi kamu tetap disini...",
"",
"Itu berarti banget buat aku...",
"",
"Aku ga janji hidup selalu mudah...",
"Tapi aku janji...",
"Aku ga akan ninggalin kamu...",
"",
"Aku akan tetap milih kamu...",
"Setiap hari...",
"",
"Aku sayang kamu ❤️"
];

function startEmotional(){
  playMusic();
  typeText(messages);
}

function typeText(lines){
  const el = document.getElementById("typingText");
  el.innerHTML="";
  let i=0,j=0;

  function typing(){
    if(i<lines.length){
      if(j<lines[i].length){
        el.innerHTML+=lines[i][j];
        j++;
        setTimeout(typing,40);
      } else {
        el.innerHTML+="<br><br>";
        i++; j=0;
        setTimeout(typing,600);
      }
    }
  }

  typing();
}

/* =========================
   MUSIC
========================= */
function playMusic(){
  const m = document.getElementById("music");
  m.volume=0;
  m.play();

  let v=0;
  const fade=setInterval(()=>{
    if(v<1){
      v+=0.05;
      m.volume=v;
    } else clearInterval(fade);
  },200);
}

/* =========================
   AUTO OPEN
========================= */
window.onload = function(){
  if(isAnniversary()){
    setTimeout(()=>{
      showPopup("secretPopup");
    },1000);
  } else {
    alert("💖 Tunggu yaa... ini akan terbuka di hari spesial kita okaayyy? 🥺");
  }
};

</script>

</body>
</html>
